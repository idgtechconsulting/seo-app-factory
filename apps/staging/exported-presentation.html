<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Exported Presentation</title>
    <style>
        body { margin: 0; background: #0f172a; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .slide-viewport { width: 90vw; height: 50.625vw; background: white; position: relative; border-radius: 8px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 4rem; display: none; flex-direction: column; justify-content: center; overflow-y: auto; color: #1e293b; }
        .slide.active { display: flex; }
        h1 { font-size: 3.5rem; margin-bottom: 1.5rem; }
        h2 { font-size: 2.5rem; margin-bottom: 1rem; }
        p, li { font-size: 1.25rem; line-height: 1.6; color: #475569; }
        ul { margin-left: 2rem; margin-bottom: 1rem; }
        code { background: #f1f5f9; padding: 0.2rem 0.4rem; border-radius: 4px; font-family: monospace; color: #e11d48; }
        pre { background: #1e293b; color: #f8fafc; padding: 1rem; border-radius: 8px; overflow-x: auto; margin: 1rem 0; font-family: monospace; }
        blockquote { border-left: 6px solid #38bdf8; padding-left: 1.5rem; font-style: italic; font-size: 1.4rem; color: #64748b; margin: 1rem 0; }
    </style>
</head>
<body>
    <div class="slide-viewport">
        ${content}
    </div>
    <script>
        let current = 0;
        const slides = document.querySelectorAll('.slide');
        function update() {
            slides.forEach((s, i) => s.classList.toggle('active', i === current));
        }
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' && current < slides.length - 1) current++;
            if (e.key === 'ArrowLeft' && current > 0) current--;
            update();
        });
        update();
    <\/script>
</body>
</html>`;

            if (document.activeElement === input) return;
            if (e.key === 'ArrowRight' || e.key === ' ') {
                e.preventDefault();
                nextSlide();
            }
            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                prevSlide();
            }
        });

        loadExample();
    </script>
