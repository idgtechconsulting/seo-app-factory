    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #7dd3fc;
            --border: #334155;
            --danger: #ef4444;
            --success: #22c55e;
            --font-mono: 'Fira Code', 'Cascadia Code', 'Source Code Pro', monospace;
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-primary);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header Styles */
        header {
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent);
        }

        .header-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn {
            background: var(--bg-tertiary);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background: var(--border);
            border-color: var(--accent);
        }

        .btn-primary {
            background: var(--accent);
            color: var(--bg-primary);
            border-color: var(--accent);
            font-weight: 600;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-danger:hover {
            background: var(--danger);
            border-color: var(--danger);
        }

        /* Toolbar Styles */
        .toolbar {
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 0.5rem 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.25rem;
            align-items: center;
            flex-shrink: 0;
        }

        .tool-btn {
            background: transparent;
            color: var(--text-muted);
            border: none;
            padding: 0.4rem 0.6rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .tool-btn:hover {
            background: var(--bg-tertiary);
            color: var(--accent);
        }

        .toolbar-divider {
            width: 1px;
            height: 20px;
            background: var(--border);
            margin: 0 0.5rem;
        }

        /* Main Editor Layout */
        main {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .pane-header {
            padding: 0.5rem 1rem;
            background: var(--bg-secondary);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #editor {
            flex: 1;
            background: var(--bg-primary);
            color: var(--text-main);
            border: none;
            resize: none;
            padding: 1.5rem;
            font-family: var(--font-mono);
            font-size: 1rem;
            line-height: 1.6;
            outline: none;
            overflow-y: auto;
            border-right: 1px solid var(--border);
        }

        #preview {
            flex: 1;
            background: #ffffff;
            color: #1a202c;
            padding: 2rem;
            overflow-y: auto;
            line-height: 1.6;
        }

        /* Markdown Rendering Styles */
        .markdown-body {
            max-width: 800px;
            margin: 0 auto;
            font-family: var(--font-sans);
        }

        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            margin-top: 1.5rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid #eaecef;
            padding-bottom: 0.3rem;
        }

        .markdown-body p { margin-bottom: 1rem; }
        .markdown-body code {
            background: #f6f8fa;
            padding: 0.2rem 0.4rem;
            border-radius: 3px;
            font-family: var(--font-mono);
            font-size: 0.9em;
        }
        .markdown-body pre {
            background: #0d1117;
            color: #c9d1d9;
            padding: 1rem;
            border-radius: 6px;
            overflow-x: auto;
            margin-bottom: 1rem;
        }
        .markdown-body pre code {
            background: transparent;
            color: inherit;
            padding: 0;
        }
        .markdown-body blockquote {
            border-left: 4px solid #dfe2e5;
            color: #6a737d;
            padding-left: 1rem;
            margin-bottom: 1rem;
            font-style: italic;
        }
        .markdown-body ul, .markdown-body ol {
            margin-bottom: 1rem;
            padding-left: 2rem;
        }
        .markdown-body table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 1rem;
        }
        .markdown-body table th, .markdown-body table td {
            border: 1px solid #dfe2e5;
            padding: 6px 13px;
        }
        .markdown-body table tr:nth-child(2n) {
            background-color: #f6f8fa;
        }
        .markdown-body img {
            max-width: 100%;
            height: auto;
        }

        /* Footer Styles */
        footer {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 0.4rem 1rem;
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            main {
                flex-direction: column;
            }
            #editor {
                border-right: none;
                border-bottom: 1px solid var(--border);
                height: 50%;
            }
            #preview {
                height: 50%;
            }
            .toolbar {
                overflow-x: auto;
                white-space: nowrap;
            }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--bg-tertiary);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--border);
        }

    <header>
        <div class="logo">
            <i class="fa-solid fa-file-code"></i>
            <span>ProMark</span>
        </div>
        <div class="header-actions">
            <button class="btn btn-danger" onclick="clearEditor()" title="Clear All">
                <i class="fa-solid fa-trash-can"></i> <span class="hide-mobile">Clear</span>
            </button>
            <button class="btn" onclick="copyHtml()" title="Copy HTML">
                <i class="fa-solid fa-copy"></i> <span class="hide-mobile">Copy HTML</span>
            </button>
            <button class="btn btn-primary" onclick="downloadMarkdown()" title="Download .md File">

    <div class="toolbar">
        <button class="tool-btn" onclick="insertText('**', '**')" title="Bold"><i class="fa-solid fa-bold"></i></button>
        <button class="tool-btn" onclick="insertText('*', '*')" title="Italic"><i class="fa-solid fa-italic"></i></button>
        <button class="tool-btn" onclick="insertText('~~', '~~')" title="Strikethrough"><i class="fa-solid fa-strikethrough"></i></button>
        <div class="toolbar-divider"></div>
        <button class="tool-btn" onclick="insertText('# ', '')" title="Heading 1"><i class="fa-solid fa-heading"></i> H1</button>
        <button class="tool-btn" onclick="insertText('## ', '')" title="Heading 2"><i class="fa-solid fa-heading"></i> H2</button>
        <button class="tool-btn" onclick="insertText('### ', '')" title="Heading 3"><i class="fa-solid fa-heading"></i> H3</button>
        <div class="toolbar-divider"></div>
        <button class="tool-btn" onclick="insertText('- ', '')" title="Unordered List"><i class="fa-solid fa-list-ul"></i></button>
        <button class="tool-btn" onclick="insertText('1. ', '')" title="Ordered List"><i class="fa-solid fa-list-ol"></i></button>
        <button class="tool-btn" onclick="insertText('> ', '')" title="Blockquote"><i class="fa-solid fa-quote-right"></i></button>
        <div class="toolbar-divider"></div>
        <button class="tool-btn" onclick="insertText('[', '](https://)')" title="Link"><i class="fa-solid fa-link"></i></button>
        <button class="tool-btn" onclick="insertText('`', '`')" title="Inline Code"><i class="fa-solid fa-code"></i></button>
        <button class="tool-btn" onclick="insertText('```\n', '\n```')" title="Code Block"><i class="fa-solid fa-square-code"></i></button>
        <div class="toolbar-divider"></div>
        <button class="tool-btn" onclick="insertText('---', '')" title="Horizontal Rule"><i class="fa-solid fa-minus"></i></button>
        <button class="tool-btn" onclick="insertText('| Col 1 | Col 2 |\n| --- | --- |\n| Val 1 | Val 2 |', '')" title="Table"><i class="fa-solid fa-table"></i></button>
    </div>

    <main>
        <section class="pane">
            <div class="pane-header">
                <span>Markdown Input</span>
                <span id="save-status" style="display: none;"><i class="fa-solid fa-check"></i> Saved</span>
            </div>
            <textarea id="editor" spellcheck="false" placeholder="Start typing your markdown here..."></textarea>
        </section>
        <section class="pane">
            <div class="pane-header">
                <span>Live Preview</span>
                <span id="view-mode">HTML Render</span>
            </div>
            <div id="preview">
                <div id="render-target" class="markdown-body"></div>
            </div>
        </section>
    </main>

    <footer>
        <div class="stats">
            Words: <span id="word-count">0</span> | 
            Characters: <span id="char-count">0</span>
        </div>
        <div class="version">ProMark v1.0.0</div>
    </footer>

    <script>
        const editor = document.getElementById('editor');
        const renderTarget = document.getElementById('render-target');
        const wordCountDisplay = document.getElementById('word-count');
        const charCountDisplay = document.getElementById('char-count');
        const saveStatus = document.getElementById('save-status');

        // Configure Marked.js
        marked.setOptions({
            highlight: function(code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            },
            breaks: true,
            gfm: true
        });

        // Initial Content
        const defaultText = `# Welcome to ProMark 🚀\n\nThis is a **professional** live markdown editor. \n\n## Features\n- **Real-time** rendering\n- Syntax highlighting for code blocks\n- Local storage persistence\n- Responsive design\n\n### Code Example\n\`\`\`javascript\nfunction helloWorld() {\n  console.log("Hello from ProMark!");\n}\nhelloWorld();\n\`\`\`\n\n### Table Example\n| Feature | Status |\n| :--- | :--- |\n| Markdown | ✅ |\n| Live Preview | ✅ |\n| Production Ready | ✅ |\n\n> "Markdown is intended to be as easy-to-read and easy-to-write as is possible." - John Gruber\n\nTry editing this text on the left!`;

        // Load from LocalStorage or use default
        window.onload = () => {
            const saved = localStorage.getItem('promark_content');
            editor.value = saved !== null ? saved : defaultText;
            updatePreview();
        };

        // Live Update Logic
        editor.addEventListener('input', () => {
            updatePreview();
            autoSave();
        });

        function updatePreview() {
            const text = editor.value;
            renderTarget.innerHTML = marked.parse(text);
            updateStats(text);
        }

        function updateStats(text) {
            const chars = text.length;
            const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
            charCountDisplay.innerText = chars;
            wordCountDisplay.innerText = words;
        }

        // Toolbar Functionality
        function insertText(before, after) {
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            const text = editor.value;
            const selected = text.substring(start, end);
            
            const newText = text.substring(0, start) + before + selected + after + text.substring(end);
            editor.value = newText;
            
            // Reset cursor position
            editor.focus();
            const cursorOffset = before.length;
            editor.setSelectionRange(start + cursorOffset, end + cursorOffset);
            
            updatePreview();
            autoSave();
        }

        // Action Functions
        function clearEditor() {
            if (confirm('Are you sure you want to clear all content?')) {
                editor.value = '';
                updatePreview();
                autoSave();
            }
        }

        function downloadMarkdown() {
            const text = editor.value;
            const blob = new Blob([text], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `document-${Date.now()}.md`;
            a.click();
            URL.revokeObjectURL(url);
        }

        async function copyHtml() {
            try {
                await navigator.clipboard.writeText(renderTarget.innerHTML);
                alert('HTML copied to clipboard!');
            } catch (err) {
                alert('Failed to copy HTML');
            }
        }

        // Auto-save to LocalStorage
        let saveTimeout;
        function autoSave() {
            saveStatus.style.display = 'none';
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                localStorage.setItem('promark_content', editor.value);
                saveStatus.style.display = 'inline-flex';
                setTimeout(() => {
                    saveStatus.style.display = 'none';
                }, 2000);
            }, 1000);
        }

        // Tab key support in textarea
        editor.addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = this.selectionStart;
                const end = this.selectionEnd;
                this.value = this.value.substring(0, start) + "    " + this.value.substring(end);
                this.selectionStart = this.selectionEnd = start + 4;
                updatePreview();
            }
        });
    </script>
