    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --accent: #10b981;
            --danger: #ef4444;
            --canvas-bg: #000000;
            --grid-color: rgba(255, 255, 255, 0.05);
            --handle-size: 10px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            padding: 1.5rem 2rem;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        main {
            flex: 1;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 0;
            height: calc(100vh - 80px);
        }

        @media (max-width: 900px) {
            main {
                grid-template-columns: 1fr;
                height: auto;
            }
            header {
                text-align: center;
                justify-content: center;
            }
        }

        /* Sidebar Controls */
        .controls {
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            overflow-y: auto;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .control-group label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
        }

        button {
            cursor: pointer;
            padding: 0.6rem 1rem;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-main);
            color: var(--text-main);
            font-weight: 500;
            transition: all 0.2s ease;
            font-size: 0.875rem;
        }

        button.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        button:hover:not(.active) {
            background: var(--border);
        }

        .btn-primary {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
            font-weight: 600;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-danger {
            color: var(--danger);
            border-color: var(--danger);
        }

        .btn-danger:hover {
            background: var(--danger);
            color: white;
        }

        input[type="color"] {
            width: 100%;
            height: 40px;
            border: none;
            border-radius: 6px;
            background: none;
            cursor: pointer;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            font-size: 0.875rem;
            user-select: none;
        }

        /* Canvas Area */
        .canvas-container {
            position: relative;
            background: var(--canvas-bg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #svg-canvas {
            flex: 1;
            width: 100%;
            height: 100%;
            cursor: crosshair;
            touch-action: none;
        }

        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-size: 20px 20px;
            background-image: 
                linear-gradient(to right, var(--grid-color) 1px, transparent 1px),
                linear-gradient(to bottom, var(--grid-color) 1px, transparent 1px);
        }

        /* Code Output Area */
        .output-section {
            height: 200px;
            background: #000;
            border-top: 2px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 1rem;
            gap: 0.5rem;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #code-output {
            flex: 1;
            background: #0a0a0a;
            color: #10b981;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 0.875rem;
            resize: none;
            outline: none;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--accent);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
            transform: translateY(100px);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
        }

        /* SVG Handle styles */
        .handle {
            fill: white;
            stroke: var(--primary);
            stroke-width: 2;
            cursor: move;
        }
        .handle:hover {
            fill: var(--primary);
        }

            SVG Shape Gen

    <main>
        <section class="controls">
            <div class="control-group">
                <label>Shape Type</label>
                <div class="btn-group">
                    <button id="btn-poly" class="active" onclick="setShape('polygon')">Poly</button>
                    <button id="btn-circle" onclick="setShape('circle')">Circle</button>
                    <button id="btn-rect" onclick="setShape('rect')">Rect</button>
                </div>
            </div>

            <div class="control-group">
                <label>Appearance</label>
                <input type="color" id="color-picker" value="#6366f1" oninput="updateColor(this.value)">
            </div>

            <div class="control-group">
                <label>Settings</label>
                <label class="checkbox-group">
                    <input type="checkbox" id="snap-grid" checked onchange="toggleSnap()"> Snap to Grid (20px)
                </label>
            </div>

            <div class="control-group" style="margin-top: auto;">
                <button id="close-poly-btn" class="btn-primary" onclick="closePolygon()" style="display: none;">Close Polygon</button>
                <button class="btn-danger" onclick="clearCanvas()">Clear Canvas</button>
            </div>
        </section>

        <section class="canvas-container">
            <div class="grid-overlay" id="grid-overlay"></div>
            <svg id="svg-canvas" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
                <g id="main-shape-group"></g>
                <g id="handles-group"></g>
            </svg>

            <div class="output-section">
                <div class="output-header">
                    <label style="font-size: 0.8rem; color: var(--text-muted); font-weight: 600;">SVG CODE</label>
                    <button class="btn-primary" onclick="copyCode()">Copy to Clipboard</button>
                </div>
                <textarea id="code-output" readonly spellcheck="false"></textarea>
            </div>
        </section>

    <div id="toast" class="toast">Copied to clipboard!</div>

    <footer style="padding: 1rem; text-align: center; font-size: 0.75rem; color: var(--text-muted); border-top: 1px solid var(--border);">
        &copy; 2023 SVG Shape Generator. Built for Web Designers.

    <script>
        // --- State Management ---
        const state = {
            shapeType: 'polygon',
            points: [], // For polygon: [{x,y}, ...]. For circle: {cx, cy, r}. For rect: {x, y, w, h}
            fillColor: '#6366f1',
            snap: true,
            isDragging: false,
            dragTarget: null,
            canvasWidth: 800,
            canvasHeight: 600,
            gridSize: 20
        };

        const canvas = document.getElementById('svg-canvas');
        const mainGroup = document.getElementById('main-shape-group');
        const handlesGroup = document.getElementById('handles-group');
        const codeOutput = document.getElementById('code-output');
        const closePolyBtn = document.getElementById('close-poly-btn');

        // Initialize
        function init() {
            setupEventListeners();
            setShape('polygon');
            updateSVG();
        }

        function setupEventListeners() {
            canvas.addEventListener('mousedown', handleMouseDown);
            window.addEventListener('mousemove', handleMouseMove);
            window.addEventListener('mouseup', handleMouseUp);
        }

        // --- Core Logic ---

        function setShape(type) {
            state.shapeType = type;
            state.points = [];
            
            // Update UI
            document.querySelectorAll('.btn-group button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${type}`).classList.add('active');
            
            closePolyBtn.style.display = (type === 'polygon') ? 'block' : 'none';

            if (type === 'circle') {
                state.points = { cx: 400, cy: 300, r: 50 };
            } else if (type === 'rect') {
                state.points = { x: 350, y: 250, w: 100, h: 100 };
            }

            updateSVG();
        }

        function updateColor(color) {
            state.fillColor = color;
            updateSVG();
        }

        function toggleSnap() {
            state.snap = document.getElementById('snap-grid').checked;
            document.getElementById('grid-overlay').style.display = state.snap ? 'block' : 'none';
        }

        function clearCanvas() {
            state.points = (state.shapeType === 'polygon') ? [] : 
                           (state.shapeType === 'circle') ? { cx: 400, cy: 300, r: 50 } : 
                           { x: 350, y: 250, w: 100, h: 100 };
            updateSVG();
        }

        function closePolygon() {
            if (state.points.length > 2) {
                // In our current logic, the SVG polygon naturally closes if we just stop adding points
                // But we can explicitly flag it as "finished" by disabling clicks
                alert("Polygon closed. You can now drag the points to refine the shape.");
                // To allow editing, we'll just keep the logic as is.
            }
        }

        // --- Interaction Logic ---

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = state.canvasWidth / rect.width;
            const scaleY = state.canvasHeight / rect.height;
            let x = (e.clientX - rect.left) * scaleX;
            let y = (e.clientY - rect.top) * scaleY;

            if (state.snap) {
                x = Math.round(x / state.gridSize) * state.gridSize;
                y = Math.round(y / state.gridSize) * state.gridSize;
            }
            return { x, y };
        }

        function handleMouseDown(e) {
            const pos = getMousePos(e);

            // Handle Dragging Logic
            if (state.isDragging) return;

            if (state.shapeType === 'polygon') {
                // Check if clicking a handle
                const handle = e.target.closest('.handle');
                if (handle) {
                    state.isDragging = true;
                    state.dragTarget = parseInt(handle.dataset.index);
                } else {
                    // Add new point
                    state.points.push({ x: pos.x, y: pos.y });
                    updateSVG();
                }
            } else if (state.shapeType === 'circle') {
                const handle = e.target.closest('.handle');
                if (handle) {
                    state.isDragging = true;
                    state.dragTarget = handle.dataset.type; // 'center' or 'radius'
                }
            } else if (state.shapeType === 'rect') {
                const handle = e.target.closest('.handle');
                if (handle) {
                    state.isDragging = true;
                    state.dragTarget = handle.dataset.type; // 'tl', 'tr', 'bl', 'br'
                }
            }
        }

        function handleMouseMove(e) {
            if (!state.isDragging) return;
            const pos = getMousePos(e);

            if (state.shapeType === 'polygon') {
                const idx = state.dragTarget;
                state.points[idx] = { x: pos.x, y: pos.y };
            } else if (state.shapeType === 'circle') {
                if (state.dragTarget === 'center') {
                    state.points.cx = pos.x;
                    state.points.cy = pos.y;
                } else {
                    const dx = pos.x - state.points.cx;
                    const dy = pos.y - state.points.cy;
                    state.points.r = Math.sqrt(dx * dx + dy * dy);
                }
            } else if (state.shapeType === 'rect') {
                const p = state.points;
                if (state.dragTarget === 'tl') { p.x = pos.x; p.y = pos.y; }
                if (state.dragTarget === 'tr') { p.w = pos.x - p.x; p.y = pos.y; } // Simplified
                if (state.dragTarget === 'bl') { p.x = pos.x; p.h = pos.y - p.y; } // Simplified
                if (state.dragTarget === 'br') { p.w = pos.x - p.x; p.h = pos.y - p.y; }
                
                // Proper Rect Logic
                if (state.dragTarget === 'tl') {
                    const dw = p.x - pos.x;
                    const dh = p.y - pos.y;
                    p.x = pos.x; p.y = pos.y;
                    p.w += dw; p.h += dh;
                } else if (state.dragTarget === 'tr') {
                    p.w = pos.x - p.x;
                    const dh = p.y - p.y; // keep top
                    p.y = pos.y;
                    p.h += dh;
                } else if (state.dragTarget === 'br') {
                    p.w = pos.x - p.x;
                    p.h = pos.y - p.y;
                } else if (state.dragTarget === 'bl') {
                    const dw = p.x - pos.x;
                    p.x = pos.x;
                    p.w += dw;
                    p.h = pos.y - p.y;
                }
            }
            updateSVG();
        }

        function handleMouseUp() {
            state.isDragging = false;
            state.dragTarget = null;
        }

        // --- Rendering ---

        function updateSVG() {
            let shapeElement = '';
            let handlesElement = '';
            let svgCode = '';

            if (state.shapeType === 'polygon') {
                const pointsStr = state.points.map(p => `${p.x},${p.y}`).join(' ');
                shapeElement = `<polygon points="${pointsStr}" fill="${state.fillColor}" stroke="white" stroke-width="1" />`;
                
                state.points.forEach((p, i) => {
                    handlesElement += `<circle cx="${p.x}" cy="${p.y}" r="5" class="handle" data-index="${i}" />`;
                });
                svgCode = `<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">\n  <polygon points="${pointsStr}" fill="${state.fillColor}" />\n</svg>`;

            } else if (state.shapeType === 'circle') {
                const { cx, cy, r } = state.points;
                shapeElement = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${state.fillColor}" stroke="white" stroke-width="1" />`;
                handlesElement = `
                    <circle cx="${cx}" cy="${cy}" r="5" class="handle" data-type="center" />
                    <circle cx="${cx + r}" cy="${cy}" r="5" class="handle" data-type="radius" />
                `;
                svgCode = `<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">\n  <circle cx="${cx}" cy="${cy}" r="${r}" fill="${state.fillColor}" />\n</svg>`;

            } else if (state.shapeType === 'rect') {
                const { x, y, w, h } = state.points;
                shapeElement = `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="${state.fillColor}" stroke="white" stroke-width="1" />`;
                handlesElement = `
                    <circle cx="${x}" cy="${y}" r="5" class="handle" data-type="tl" />
                    <circle cx="${x + w}" cy="${y}" r="5" class="handle" data-type="tr" />
                    <circle cx="${x}" cy="${y + h}" r="5" class="handle" data-type="bl" />
                    <circle cx="${x + w}" cy="${y + h}" r="5" class="handle" data-type="br" />
                `;
                svgCode = `<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">\n  <rect x="${x}" y="${y}" width="${w}" height="${h}" fill="${state.fillColor}" />\n</svg>`;
            }

            mainGroup.innerHTML = shapeElement;
            handlesGroup.innerHTML = handlesElement;
            codeOutput.value = svgCode;
        }

        function copyCode() {
            codeOutput.select();
            document.execCommand('copy');
            
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // Start the app
        init();
    </script>
